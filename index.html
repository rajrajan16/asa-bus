<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASA Bus Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');

  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    width:1920px; height:1080px;
    overflow:hidden; background:#0e1f5e;
    /* Fallback font if Google Fonts fails */
    font-family:'Nunito', Arial, sans-serif;
  }
  .screen {
    width:1920px; height:1080px;
    display:grid;
    grid-template-rows: 130px 950px;
    grid-template-columns: 955px 10px 955px;
  }
  .title-row {
    grid-column:1/4; background:#0e1f5e;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-wrap {
    position:absolute; left:30px; top:50%; transform:translateY(-50%);
    height:110px; width:110px;
  }
  .logo-wrap img { height:100%; width:100%; object-fit:contain; }
  .title-row { position:relative; }
  .title-text {
    font-weight:900; font-size:90px;
    color:#f5c800; letter-spacing:0.12em; text-transform:uppercase;
  }
  .divider { grid-row:2; grid-column:2; background:#0e1f5e; }
  .col {
    background:#f5c800;
    display:grid; grid-template-rows:210px 1fr;
    align-items:center; justify-items:center;
    overflow:hidden; padding:20px 30px 30px;
  }
  .arrow-wrap {
    width:85%; height:100%;
    display:flex; align-items:center; justify-content:center;
  }
  .arrow-wrap svg { width:100%; height:100%; }
  .letters {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; min-height:0; min-width:0;
  }
  .letters-text {
    font-weight:900; color:#0e1f5e;
    text-align:center; white-space:pre-line;
    line-height:1.1; letter-spacing:0.03em;
    word-break:break-word; width:100%; padding:0 20px;
  }
  .live-dot {
    position:fixed; bottom:12px; right:16px;
    width:14px; height:14px; border-radius:50%;
    background:#4ade80; box-shadow:0 0 10px #4ade80;
    animation:livepulse 2s infinite; z-index:999;
  }
  @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
  @keyframes flashIn{0%{opacity:0;transform:scale(.93)}65%{opacity:1;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
  .flash { animation:flashIn 0.4s ease forwards; }
</style>
</head>
<body>
<div class="screen">
  <div class="title-row"><div class="logo-wrap"><img src="https://pandujaya.com/img/logo.png" alt="Logo"></div><div class="title-text">ASA BUS</div></div>
  <div class="col">
    <div class="arrow-wrap">
      <svg viewBox="0 0 400 120" fill="none">
        <polygon points="0,60 150,0 150,38 400,38 400,82 150,82 150,120" fill="#d92b2b"/>
      </svg>
    </div>
    <div class="letters" id="leftLetters">
      <div class="letters-text" id="leftText"></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="arrow-wrap">
      <svg viewBox="0 0 400 120" fill="none">
        <polygon points="400,60 250,0 250,38 0,38 0,82 250,82 250,120" fill="#d92b2b"/>
      </svg>
    </div>
    <div class="letters" id="rightLetters">
      <div class="letters-text" id="rightText"></div>
    </div>
  </div>
</div>
<div class="live-dot" id="liveDot"></div>

<script>
  var API_URL = 'https://script.google.com/macros/s/AKfycbwAWugHhqiLc9mB6yUcH-ab_VIz6TzAjs_kggNVoRZaxuO69Kw4pxQF2vGzm980pzmFqQ/exec?page=data';
  var lastTimestamp = '0';

  function fitText(el, container) {
    if (!el.textContent.trim()) { el.style.fontSize='80px'; return; }
    var lo=30, hi=600, best=lo;
    while (lo<=hi) {
      var mid=Math.floor((lo+hi)/2);
      el.style.fontSize=mid+'px';
      if (el.scrollHeight<=container.clientHeight && el.scrollWidth<=container.clientWidth) {
        best=mid; lo=mid+1;
      } else { hi=mid-1; }
    }
    el.style.fontSize=best+'px';
  }

  function flashUpdate(el, container, newText) {
    el.textContent=newText;
    requestAnimationFrame(function() {
      fitText(el, container);
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    });
  }

  function loadContent() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', API_URL + '&t=' + Date.now(), true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (data.updatedAt !== lastTimestamp) {
            lastTimestamp = data.updatedAt;
            flashUpdate(
              document.getElementById('leftText'),
              document.getElementById('leftLetters'),
              (data.left  || '').trim()
            );
            flashUpdate(
              document.getElementById('rightText'),
              document.getElementById('rightLetters'),
              (data.right || '').trim()
            );
          }
          document.getElementById('liveDot').style.background = '#4ade80';
        } catch(e) {
          document.getElementById('liveDot').style.background = '#f87171';
        }
      }
    };
    xhr.onerror = function() {
      document.getElementById('liveDot').style.background = '#f87171';
    };
    xhr.send();
  }

  loadContent();
  setInterval(loadContent, 2000);
</script>
</body>
</html>
